apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: nephro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: dhidr/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: nephro
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8082
      targetPort: 8082
      nodePort: 30800
  type: NodePort
