apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-lab
  namespace: nephro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-lab
  template:
    metadata:
      labels:
        app: mysql-lab
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: MYSQL_DATABASE
              value: lab_results_db
          ports:
            - containerPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-lab
  namespace: nephro
spec:
  selector:
    app: mysql-lab
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP
