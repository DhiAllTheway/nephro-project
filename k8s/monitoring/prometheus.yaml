apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: nephro
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'lab-results-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['lab-results-service:9003']

      - job_name: 'prescriptions-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['prescriptions-service:9004']

      - job_name: 'api-gateway'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['api-gateway:8082']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: nephro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
          volumeMounts:
            - name: prometheus-config-volume
              mountPath: /etc/prometheus
      volumes:
        - name: prometheus-config-volume
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: nephro
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
  type: NodePort
