<div class="mb-4 flex items-center justify-between">
  <h1 class="text-2xl font-semibold text-gray-900 dark:text-white">New Prescription</h1>

  <a routerLink="/prescriptions" class="rounded-lg border border-gray-200 px-4 py-2 dark:border-gray-800">
    Back
  </a>
</div>

@if (error) {
  <div class="mb-4 rounded-xl border border-red-300 bg-red-50 p-4 text-red-700">
    {{ error }}
  </div>
}

<div class="rounded-xl border border-gray-200 bg-white p-6 dark:border-gray-800 dark:bg-gray-900">
  <div class="grid grid-cols-1 gap-4 md:grid-cols-2">

    <div>
      <label class="block mb-1 text-sm text-gray-500">Patient ID</label>
      <input type="number" class="w-full rounded-lg border px-3 py-2"
             [(ngModel)]="prescription.patientId">
    </div>

    <div>
      <label class="block mb-1 text-sm text-gray-500">Prescription Date</label>
      <input type="date" class="w-full rounded-lg border px-3 py-2"
             [(ngModel)]="prescription.prescriptionDate">
    </div>

    <div>
      <label class="block mb-1 text-sm text-gray-500">Doctor Name</label>
      <input class="w-full rounded-lg border px-3 py-2"
             [(ngModel)]="prescription.doctorName">
    </div>

    <div class="md:col-span-2">
      <label class="block mb-1 text-sm text-gray-500">Notes</label>
      <textarea class="w-full rounded-lg border px-3 py-2"
                rows="4"
                [(ngModel)]="prescription.notes"></textarea>
    </div>
  </div>

  <div class="mt-4 flex gap-2">
    <button
      (click)="save()"
      class="rounded-lg bg-brand-500 px-4 py-2 text-white hover:bg-brand-600"
      [disabled]="loading"
    >
      Save
    </button>

    <a routerLink="/prescriptions" class="rounded-lg border border-gray-200 px-4 py-2 dark:border-gray-800">
      Cancel
    </a>
  </div>
</div>
